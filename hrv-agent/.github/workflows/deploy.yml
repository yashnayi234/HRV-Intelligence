name: Deploy HRV Agent

on:
  push:
    branches: [main]
  workflow_dispatch:     # Allow manual trigger from GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r hrv-agent/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          cd hrv-agent && ruff check . --select E,F --ignore E501

      - name: Run unit tests
        run: |
          cd hrv-agent
          # Mock AWS credentials so tests don't need real Bedrock
          AWS_ACCESS_KEY_ID=test \
          AWS_SECRET_ACCESS_KEY=test \
          AWS_REGION=us-west-2 \
          PYTHONPATH=. pytest tests/ -v --timeout=30

  # ── Job 2: Deploy Backend → Lambda ──────────────────────────────────────────
  deploy-backend:
    name: Build & Deploy Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Lambda image to ECR
        working-directory: hrv-agent
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f deploy/Dockerfile.lambda \
            -t "$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY:latest"
          echo "image=$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda (create or update)
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          API_GATEWAY_ID: ${{ secrets.API_GATEWAY_ID }}
          IMAGE_TAG: ${{ github.sha }}
          FUNCTION_NAME: hrv-agent
        run: |
          # Check if function exists
          FUNCTION_EXISTS=$(aws lambda get-function \
            --function-name "$FUNCTION_NAME" \
            --query 'Configuration.FunctionName' \
            --output text 2>/dev/null || echo "not-found")

          if [ "$FUNCTION_EXISTS" = "not-found" ]; then
            echo "Creating Lambda function..."
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --package-type Image \
              --code ImageUri="${ECR_REPOSITORY}:${IMAGE_TAG}" \
              --role "$LAMBDA_ROLE_ARN" \
              --timeout 120 \
              --memory-size 1024 \
              --environment "Variables={LOG_LEVEL=info,AWS_REGION=${{ secrets.AWS_REGION }}}"

            # Wait until active
            aws lambda wait function-active --function-name "$FUNCTION_NAME"

            # Create Lambda integration in API Gateway
            LAMBDA_ARN=$(aws lambda get-function \
              --function-name "$FUNCTION_NAME" \
              --query 'Configuration.FunctionArn' \
              --output text)

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id "$API_GATEWAY_ID" \
              --integration-type AWS_PROXY \
              --integration-uri "$LAMBDA_ARN" \
              --payload-format-version "2.0" \
              --query 'IntegrationId' \
              --output text)

            # Route: ANY /{proxy+}
            aws apigatewayv2 create-route \
              --api-id "$API_GATEWAY_ID" \
              --route-key "ANY /{proxy+}" \
              --target "integrations/$INTEGRATION_ID"

            # Deploy API stage
            aws apigatewayv2 create-stage \
              --api-id "$API_GATEWAY_ID" \
              --stage-name '$default' \
              --auto-deploy

            # Grant API Gateway permission to invoke Lambda
            aws lambda add-permission \
              --function-name "$FUNCTION_NAME" \
              --statement-id apigateway-invoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:${AWS_REGION}:*:${API_GATEWAY_ID}/*/*"

          else
            echo "Updating Lambda function..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --image-uri "${ECR_REPOSITORY}:${IMAGE_TAG}"

            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          fi

          echo "✅ Lambda deployed: $FUNCTION_NAME"

  # ── Job 3: Deploy Frontend → S3 + CloudFront ────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hrv-dashboard/package-lock.json

      - name: Install & Build React app
        working-directory: hrv-dashboard
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        working-directory: hrv-dashboard
        run: |
          aws s3 sync dist/ "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html — no cache
          aws s3 cp dist/index.html "s3://${{ secrets.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"

          echo "✅ Frontend deployed & CDN cache cleared"
